version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "docs"
    schedule:
      interval: "weekly"
    groups:
      docs:
        patterns:
          - "*"
