version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.

  - package-ecosystem: "bundler"
    directory: "docs"
    schedule:
      interval: "weekly"
    groups:
      docs:
        patterns:
          - "*"
