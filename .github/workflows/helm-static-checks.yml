---
name: Helm static checks
on:
  pull_request_review:
    types: [submitted]
  pull_request:
    branches:
      - master
      - release/**
      - next/**
    paths:
      - helm/**
      - test/postman/helm/**
      - .github/workflows/helm*
  push:
    branches:
      - master
      - release/**
jobs:
  build_vars:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request_review'
      || (
        github.event_name == 'pull_request_review'
        && github.event.review.state == 'approved'
        && github.event.pull_request.user.login == 'github-actions[bot]'
      )
    outputs:
      app_charts: ${{ steps.getcharts.outputs.app }}
      lib_charts: ${{ steps.getcharts.outputs.lib }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2
      - id: getcharts
        uses: >-
          ./.github/actions/charts-as-json
        with:
          charts-root: helm

  helm_unit_test:
    needs:
      - build_vars
    strategy:
      matrix: ${{ fromJSON(needs.build_vars.outputs.app_charts) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: >-
          Alfresco/alfresco-build-tools/.github/actions/helm-build-chart@v18.15.1
        with:
          chart-dir: helm/${{ matrix.charts.name }}
      - uses: >-
          Alfresco/alfresco-build-tools/.github/actions/helm-plugin@v18.15.1
        with:
          plugin_url: https://github.com/helm-unittest/helm-unittest
          plugin_version: v1.0.0
      - name: Run Helm unit tests if present
        run: |
          if [ -d "helm/${{ matrix.charts.name }}/tests" ]; then helm unittest helm/${{ matrix.charts.name }}
          else echo "${{ matrix.charts.name }} chart has no unit tests... skipping."
          fi

  helm_yaml_lint:
    needs:
      - build_vars
    strategy:
      matrix: ${{ fromJSON(needs.build_vars.outputs.app_charts) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: >-
          Alfresco/alfresco-build-tools/.github/actions/helm-build-chart@v18.15.1
        with:
          chart-dir: helm/${{ matrix.charts.name }}
      - uses: >-
          Alfresco/alfresco-build-tools/.github/actions/helm-template-yamllint@v18.15.1
        with:
          chart-dir: helm/${{ matrix.charts.name }}
          helm-options: >-
            --set global.search.sharedSecret=dummy
            --set global.search.alfrescoRegistryPullSecrets=dummy
